# Builds Windows portable + NSIS installer on tag push and publishes to the
# GitHub Release. Runs on ubuntu-latest — a Linux runner avoids the Windows
# Defender false-positive that deletes electron.exe during local NSIS packaging.
# electron-builder cross-builds Windows NSIS on Linux via Wine.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for electron-builder to create/upload the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wine (for cross-building Windows NSIS on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            wine32 wine64 wine \
            xvfb

      - name: Start virtual display (Wine GUI calls need an X server)
        run: Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 & echo "Xvfb started"; echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm install

      - name: Build renderer (Vite)
        working-directory: app
        run: npm run build

      - name: Build & publish Windows artifacts
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis portable --x64 --publish onTag

      # Safety net: upload artifacts even if publish fails.
      - name: Upload artifacts (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aetherai-win-artifacts
          path: |
            app/release/*.exe
            app/release/latest*.yml
            app/release/*.blockmap
          if-no-files-found: warn
