# Builds Windows portable + NSIS installer on tag push and publishes both to the
# GitHub Release. Runs on ubuntu-latest — a Linux runner avoids the Windows
# Defender false-positive that deletes electron.exe during local NSIS packaging.
# electron-builder cross-builds Windows NSIS on Linux via Wine.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for electron-builder to create/upload the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wine (for cross-building Windows NSIS on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            wine32 wine64 wine \
            xvfb
      - name: Start virtual display (Wine GUI calls need an X server)
        run: Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 & echo "Xvfb started"; echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm install

      - name: Build renderer (Vite)
        working-directory: app
        run: npm run build

      - name: Build & publish Windows artifacts
        working-directory: app
        env:
          # electron-builder reads GH_TOKEN to authenticate to the GitHub
          # Releases API. GITHUB_TOKEN is auto-provided by Actions and has
          # contents:write via the permissions: block above.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis portable --x64 --publish always

      # electron-builder --publish always already uploaded both artifacts +
      # latest.yml + .blockmap to the Release, so this is a SAFETY NET for
      # inspection if the publish step failed (no-op for the Release itself).
      - name: Upload artifacts (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aetherai-win-artifacts
          path: |
            app/release/*.exe
            app/release/latest*.yml
            app/release/*.blockmap
          if-no-files-found: warn

      # Write a human-readable release body: a download guide (which file to
      # pick) + an auto-generated changelog from the commits since the last tag.
      # electron-builder's --publish always leaves the body empty.
      - name: Write release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG=${GITHUB_REF_NAME}
          # Find the previous tag for the changelog range.
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
            LOG=$(git log --pretty=format:'- %s' "$RANGE" | head -40)
          else
            LOG=$(git log --pretty=format:'- %s' -20)
          fi
          # Mark the Setup exe as recommended; explain each file.
          cat > /tmp/notes.md <<EOF
          ## Downloads

          | File | What it is |
          | --- | --- |
          | **AetherAI-Setup-${TAG#v}.exe** | 🟢 **Recommended** — installer. Installs per-user (no admin), auto-updates in-app. |
          | AetherAI-${TAG#v}.exe | Portable single-exe. No install, no auto-update — just run it. |
          | latest.yml / *.blockmap | Update metadata used by the auto-updater. Ignore unless debugging updates. |

          > First launch of the installer shows a SmartScreen "unknown publisher" warning — expected for an unsigned solo app. The app is safe; all data stays local.

          ## Changes

          ${LOG}

          ---

          **Install:** download the Setup exe, run it, launch AetherAI. **Update later:** Settings → Updates → Check now (the installer auto-updates; portable builds download the new release manually).
          EOF
          gh release edit "$TAG" --notes-file /tmp/notes.md
