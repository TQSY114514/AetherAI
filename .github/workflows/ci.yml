name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build renderer
        working-directory: app
        run: npm run build

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Verify main-process modules parse
        working-directory: app
        run: node --check electron/database.js && node --check electron/ipc/chat.handler.js && node --check electron/ipc/config.handler.js && node --check electron/ipc/provider.handler.js && node --check electron/ipc/model.handler.js
